apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: laboratorio
  labels:
    app: nginx
    proyecto: laboratorio-kubernetes
  annotations:
    descripcion: "Deployment de aplicación nginx"
    autor: "Brenda De La O"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80

        env:
        - name: MENSAJE
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: MENSAJE

        - name: USERNAME
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: USERNAME

        volumeMounts:
        - name: nginx-storage
          mountPath: /usr/share/nginx/html

      volumes:
      - name: nginx-storage
        emptyDir: {}